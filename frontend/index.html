<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HabitFlow — Defeat Starting Paralysis</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            background: #0f0f11 url('/static/habitflow.jpg') no-repeat center center fixed;
            background-size: cover;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #fff;
        }

        .header-section {
            text-align: center;
            margin-bottom: 40px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.8);
        }

        .header-section h1 {
            font-size: 3.5rem;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 10px;
        }

        .header-section p {
            font-size: 1.2rem;
            color: #ccc;
        }

        .workspace-container {
            display: flex;
            width: 100%;
            max-width: 1100px;
            gap: 30px;
            align-items: flex-start;
            justify-content: center;
        }

        .panel-card {
            background: rgba(255, 255, 255, 0.98);
            color: #111;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            flex: 1;
            min-width: 320px;
        }

        /* Input Form Elements */
        .panel-card h2 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 20px;
            letter-spacing: -0.5px;
        }

        .input-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 700;
            color: #777;
            margin-bottom: 8px;
            display: block;
        }

        .textarea-dump {
            width: 100%;
            height: 140px;
            padding: 16px;
            border-radius: 12px;
            border: 1px solid #ddd;
            background: #f5f5f7;
            font-size: 1rem;
            color: #222;
            resize: none;
            outline: none;
            transition: border-color 0.2s;
            margin-bottom: 25px;
        }

        .textarea-dump:focus {
            border-color: #111;
        }

        .select-dropdown {
            width: 100%;
            padding: 14px 16px;
            border-radius: 12px;
            border: 1px solid #ddd;
            background: #f5f5f7;
            font-size: 1rem;
            color: #222;
            outline: none;
            cursor: pointer;
            margin-bottom: 30px;
            appearance: none;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24' fill='none' stroke='%23333' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'></polyline></svg>");
            background-repeat: no-repeat;
            background-position: right 16px center;
            background-size: 16px;
        }

        .btn-action {
            width: 100%;
            padding: 16px;
            background: #1e1e24;
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        .btn-action:hover {
            background: #111;
        }

        .btn-action:active {
            transform: scale(0.99);
        }

        /* Target Output Containers */
        #generativeBox {
            min-height: 250px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .loading-text {
            text-align: center;
            color: #666;
            font-size: 1.1rem;
            font-weight: 500;
            padding: 60px 20px;
            animation: pulse 2s infinite ease-in-out;
        }

        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }
    </style>
</head>
<body>

    <div class="header-section">
        <h1>HabitFlow</h1>
        <p>Defeat starting paralysis. Match your energy to your milestones.</p>
    </div>

    <div class="workspace-container">
        <!-- Left Side: Interactive Formulation Panel -->
        <div class="panel-card">
            <h2>What's on your mind?</h2>
            
            <label class="input-label">The Task Dump</label>
            <textarea id="taskInput" class="textarea-dump" placeholder="Dump your raw, unorganized task list or project objectives here..."></textarea>
            
            <label class="input-label">Current Energy Level</label>
            <select id="energySelect" class="select-dropdown">
                <option value="Low / Exhausted (Use 5-Min Rule)">Low / Exhausted (Use 5-Min Rule)</option>
                <option value="Medium / Standard Focus" selected>Medium / Standard Focus</option>
                <option value="High / Peak Execution Drive">High / Peak Execution Drive</option>
            </select>
            
            <button class="btn-action" onclick="generatePlan()">Generate Action Plan</button>
        </div>

        <!-- Right Side: Hidden Generative Delivery Viewport -->
        <div id="generativeBox" class="panel-card" style="display: none;">
            <div id="boxContent">
                <!-- Inner content changes programmatically -->
            </div>
        </div>
    </div>

    <script>
        async function generatePlan() {
            const taskInput = document.getElementById("taskInput").value.trim();
            const energyLevel = document.getElementById("energySelect").value;
            
            const generativeBox = document.getElementById("generativeBox");
            const boxContent = document.getElementById("boxContent");

            // Prevent blank actions
            if (!taskInput) {
                alert("Please dump your task thoughts first!");
                return;
            }

            // 1. Instantly present the container with the dynamic loading statement
            generativeBox.style.display = "block";
            boxContent.innerHTML = `
                <div class="loading-text">
                    Gemini is engineering your low-friction strategy...
                </div>
            `;

            try {
                // 2. Perform relative fetch query back to host origin
                const response = await fetch("/api/analyze-task", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        task_description: taskInput,
                        energy_level: energyLevel
                    })
                });

                if (!response.ok) throw new Error("Backend pipeline error exception");
                const data = await response.json();

                // 3. Compile the production interface view injection
                let tasksHtml = `
                    <div style="text-align: left;">
                        <span style="font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; color: #e65100; background: #fff3e0; padding: 6px 14px; border-radius: 20px; font-weight: bold; display: inline-block; margin-bottom: 5px;">
                            ${data.recommended_action_strategy}
                        </span>
                        <h3 style="margin-top: 10px; font-size: 1.6rem; color: #111; line-height: 1.3;">${data.original_task}</h3>
                        <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">
                        <p style="font-size: 0.8rem; text-transform: uppercase; font-weight: bold; color: #888; letter-spacing: 0.5px; margin-bottom: 15px;">Micro-Step Execution Pipeline</p>
                `;

                data.suggested_micro_tasks.forEach((task, index) => {
                    tasksHtml += `
                        <div style="display: flex; align-items: flex-start; margin-bottom: 16px; background: #f8f9fa; padding: 18px; border-radius: 12px; border-left: 4px solid #111; box-shadow: 0 2px 5px rgba(0,0,0,0.02);">
                            <div style="background: #111; color: #fff; width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.85rem; font-weight: bold; margin-right: 14px; flex-shrink: 0; margin-top: 2px;">
                                ${index + 1}
                            </div>
                            <div>
                                <h4 style="margin: 0 0 6px 0; font-size: 1.1rem; color: #1a1a1a; font-weight: 700;">
                                    ${task.task_title} <span style="font-weight: normal; color: #666; font-size: 0.85rem; margin-left: 4px;">(${task.estimated_minutes} mins)</span>
                                </h4>
                                <p style="margin: 0; font-size: 0.95rem; color: #444; line-height: 1.4;">${task.justification}</p>
                            </div>
                        </div>
                    `;
                });

                tasksHtml += `</div>`;
                
                // Swap processing banner out for the finalized execution route map
                boxContent.innerHTML = tasksHtml;

            } catch (error) {
                console.error("API Fetch execution failure:", error);
                boxContent.innerHTML = `
                    <div style="color: #d32f2f; padding: 10px; text-align: left; font-size: 0.95rem; line-height: 1.5;">
                        <strong style="font-size: 1.05rem;">Execution Pipeline Connection Blocker:</strong><br>
                        Could not draw a response stream from the backend engine. Check your service container configurations on Render.
                    </div>
                `;
            }
        }
    </script>
</body>
</html>
