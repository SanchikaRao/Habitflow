<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HabitFlow — Defeat Starting Paralysis</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            background: #0f0f11 url('/static/habitflow.jpg') no-repeat center center fixed;
            background-size: cover;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #ffffff;
        }

        .header-section {
            text-align: center;
            margin-bottom: 40px;
            text-shadow: 0 4px 15px rgba(0,0,0,0.9);
        }

        .header-section h1 {
            font-size: 3.5rem;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 10px;
        }

        .header-section p {
            font-size: 1.2rem;
            color: #cccccc;
        }

        .workspace-container {
            display: flex;
            width: 100%;
            max-width: 1100px;
            gap: 30px;
            align-items: flex-start;
            justify-content: center;
        }

        /* ---- Frosted Dark-Glass Panel Architecture ---- */
        .panel-card {
            background: rgba(15, 15, 18, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            flex: 1;
            min-width: 320px;
            transition: all 0.3s ease;
        }

        .panel-card h2 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 20px;
            letter-spacing: -0.5px;
            color: #ffffff;
        }

        .input-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 8px;
            display: block;
        }

        /* ---- Form Control Styling Matching Background ---- */
        .textarea-dump {
            width: 100%;
            height: 140px;
            padding: 16px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
            font-size: 1rem;
            color: #ffffff;
            resize: none;
            outline: none;
            transition: all 0.2s;
            margin-bottom: 25px;
        }

        .textarea-dump:focus {
            border-color: rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.08);
        }

        .textarea-dump::placeholder {
            color: rgba(255, 255, 255, 0.35);
        }

        .select-dropdown {
            width: 100%;
            padding: 14px 16px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
            font-size: 1rem;
            color: #ffffff;
            outline: none;
            cursor: pointer;
            margin-bottom: 30px;
            appearance: none;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24' fill='none' stroke='%23fff' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'></polyline></svg>");
            background-repeat: no-repeat;
            background-position: right 16px center;
            background-size: 16px;
        }

        .select-dropdown option {
            background: #151518;
            color: #ffffff;
        }

        .btn-action {
            width: 100%;
            padding: 16px;
            background: #ffffff;
            color: #111111;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-action:hover {
            background: rgba(255, 255, 255, 0.9);
            transform: translateY(-1px);
        }

        .btn-action:active {
            transform: scale(0.99);
        }

        /* ---- Dynamic Generated Content Styling ---- */
        #generativeBox {
            min-height: 250px;
        }

        .loading-text {
            text-align: center;
            color: rgba(255, 255, 255, 0.6);
            font-size: 1.1rem;
            font-weight: 500;
            padding: 60px 20px;
            animation: pulse 2s infinite ease-in-out;
        }

        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }

        /* ---- DYNAMIC MOBILE RESPONSIVE ENGINE ---- */
        @media (max-width: 768px) {
            body {
                padding: 15px;
                justify-content: flex-start;
            }

            .header-section {
                margin-bottom: 25px;
                margin-top: 10px;
            }

            .header-section h1 {
                font-size: 2.5rem;
            }

            .header-section p {
                font-size: 1rem;
                line-height: 1.4;
            }

            .workspace-container {
                flex-direction: column;
                gap: 20px;
                width: 100%;
            }

            .panel-card {
                width: 100%;
                min-width: 100%;
                padding: 20px;
            }

            .panel-card h2 {
                font-size: 1.5rem;
                margin-bottom: 15px;
            }

            .textarea-dump {
                height: 120px;
                margin-bottom: 20px;
            }

            .select-dropdown {
                margin-bottom: 20px;
            }
        }
    </style>
</head>
<body>

    <div class="header-section">
        <h1>HabitFlow</h1>
        <p>Defeat starting paralysis. Match your energy to your milestones.</p>
    </div>

    <div class="workspace-container">
        <div class="panel-card">
            <h2>What's on your mind?</h2>
            
            <label class="input-label">The Task Dump</label>
            <textarea id="taskInput" class="textarea-dump" placeholder="Dump your raw, unorganized task list or project objectives here..."></textarea>
            
            <label class="input-label">Current Energy Level</label>
            <select id="energySelect" class="select-dropdown">
                <option value="Low / Exhausted (Use 5-Min Rule)">Low / Exhausted (Use 5-Min Rule)</option>
                <option value="Medium / Standard Focus" selected>Medium / Standard Focus</option>
                <option value="High / Peak Execution Drive">High / Peak Execution Drive</option>
            </select>
            
            <button class="btn-action" onclick="generatePlan()">Generate Action Plan</button>
        </div>

        <div id="generativeBox" class="panel-card" style="display: none;">
            <div id="boxContent">
                </div>
        </div>
    </div>

    <script>
        async function generatePlan() {
            const taskInput = document.getElementById("taskInput").value.trim();
            const energyLevel = document.getElementById("energySelect").value;
            
            const generativeBox = document.getElementById("generativeBox");
            const boxContent = document.getElementById("boxContent");

            if (!taskInput) {
                alert("Please dump your task thoughts first!");
                return;
            }

            // 1. Instantly display loading state inside dark frosted layout
            generativeBox.style.display = "block";
            boxContent.innerHTML = `
                <div class="loading-text">
                    Gemini is engineering your low-friction strategy...
                </div>
            `;

            // Dynamic view scroll target for smaller phone screen viewports
            if (window.innerWidth <= 768) {
                generativeBox.scrollIntoView({ behavior: 'smooth' });
            }

            try {
                const response = await fetch("/api/analyze-task", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        task_description: taskInput,
                        energy_level: energyLevel
                    })
                });

                if (!response.ok) throw new Error("Backend pipeline connection fault");
                const data = await response.json();

                // 3. Compile the production interface view injection
                let tasksHtml = `
                    <div style="text-align: left;">
                        <span style="font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; color: #fff; background: rgba(230, 81, 0, 0.85); padding: 6px 14px; border-radius: 20px; font-weight: bold; display: inline-block; margin-bottom: 12px;">
                            ${data.recommended_action_strategy}
                        </span>
                        <h3 style="font-size: 1.5rem; color: #ffffff; line-height: 1.3; font-weight: 700; margin-bottom: 15px;">${data.original_task}</h3>
                        <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin: 20px 0;">
                        <p style="font-size: 0.8rem; text-transform: uppercase; font-weight: bold; color: rgba(255,255,255,0.5); letter-spacing: 0.5px; margin-bottom: 15px;">Micro-Step Execution Pipeline</p>
                `;

                data.suggested_micro_tasks.forEach((task, index) => {
                    tasksHtml += `
                        <div style="display: flex; align-items: flex-start; margin-bottom: 16px; background: rgba(255, 255, 255, 0.04); padding: 18px; border-radius: 12px; border-left: 4px solid #ffffff; box-shadow: 0 4px 15px rgba(0,0,0,0.2);">
                            <div style="background: #ffffff; color: #111111; width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.85rem; font-weight: bold; margin-right: 14px; flex-shrink: 0; margin-top: 2px;">
                                ${index + 1}
                            </div>
                            <div>
                                <h4 style="margin: 0 0 6px 0; font-size: 1.1rem; color: #ffffff; font-weight: 700; line-height: 1.3;">
                                    ${task.task_title} <span style="font-weight: normal; color: rgba(255,255,255,0.6); font-size: 0.85rem; margin-left: 4px;">(${task.estimated_minutes} mins)</span>
                                </h4>
                                <p style="margin: 0; font-size: 0.95rem; color: rgba(255,255,255,0.8); line-height: 1.45;">${task.justification}</p>
                            </div>
                        </div>
                    `;
                });

                tasksHtml += `</div>`;
                boxContent.innerHTML = tasksHtml;

            } catch (error) {
                console.error("API Fetch execution failure:", error);
                boxContent.innerHTML = `
                    <div style="color: #ff6b6b; padding: 10px; text-align: left; font-size: 0.95rem; line-height: 1.5;">
                        <strong style="font-size: 1.05rem;">Execution Pipeline Blocker:</strong><br>
                        Could not draw a response stream from the backend engine. Check your service container configurations on Render.
                    </div>
                `;
            }
        }
    </script>
</body>
</html>
